<!-- Hamburger button (mobile only) -->
<button class="hamburger" (click)="toggleMenu()" aria-label="Open menu">
  <i class="fa-solid" [class.fa-bars]="!menuOpen" [class.fa-xmark]="menuOpen"></i>
</button>

<!-- Backdrop (mobile only) -->
<div class="nav-backdrop" [class.open]="menuOpen" (click)="closeMenu()"></div>

<aside class="nav-cards-panel" [class.mobile-open]="menuOpen">

  <!-- Logo -->
  <a routerLink="/" class="panel-logo">
    <img src="ronquillo_logo_white_ver.png" alt="Logo">
    <div class="panel-logo-name">
  <span>Michael Ronquillo</span>
</div>
  </a>

  <a routerLink="/" class="nav-card" (mouseenter)="playHoverSound()" (click)="playClickSound()">
    <div class="nav-card-icon"><i class="fa-solid fa-house"></i></div>
    <div class="nav-card-text">
      <span class="nav-card-title">Home</span>
      <span class="nav-card-subtitle">Back to start</span>
    </div>
    <i class="fa-solid fa-chevron-right nav-card-arrow"></i>
  </a>

  <a href="https://about-ronquillo.carrd.co/" target="_blank" class="nav-card" (mouseenter)="playHoverSound()" (click)="playClickSound()">
    <div class="nav-card-icon"><i class="fa-solid fa-user"></i></div>
    <div class="nav-card-text">
      <span class="nav-card-title">About</span>
      <span class="nav-card-subtitle">Who I am</span>
    </div>
    <i class="fa-solid fa-chevron-right nav-card-arrow"></i>
  </a>

  <a href="https://ronquillo-best-artefacts.carrd.co/" target="_blank" class="nav-card" (mouseenter)="playHoverSound()" (click)="playClickSound()">
    <div class="nav-card-icon"><i class="fa-solid fa-folder-open"></i></div>
    <div class="nav-card-text">
      <span class="nav-card-title">Projects</span>
      <span class="nav-card-subtitle">My best work</span>
    </div>
    <i class="fa-solid fa-chevron-right nav-card-arrow"></i>
  </a>

  <a routerLink="/references" routerLinkActive="active-card" class="nav-card" (mouseenter)="playHoverSound()" (click)="playClickSound()">
    <div class="nav-card-icon"><i class="fa-solid fa-users"></i></div>
    <div class="nav-card-text">
      <span class="nav-card-title">References</span>
      <span class="nav-card-subtitle">Testimonials</span>
    </div>
    <i class="fa-solid fa-chevron-right nav-card-arrow"></i>
  </a>

  <a routerLink="/certificates" routerLinkActive="active-card" class="nav-card" (mouseenter)="playHoverSound()" (click)="playClickSound()">
    <div class="nav-card-icon"><i class="fa-solid fa-certificate"></i></div>
    <div class="nav-card-text">
      <span class="nav-card-title">Certificates</span>
      <span class="nav-card-subtitle">My credentials</span>
    </div>
    <i class="fa-solid fa-chevron-right nav-card-arrow"></i>
  </a>

  <a routerLink="/contact" routerLinkActive="active-card" class="nav-card" (mouseenter)="playHoverSound()" (click)="playClickSound()">
    <div class="nav-card-icon"><i class="fa-solid fa-envelope"></i></div>
    <div class="nav-card-text">
      <span class="nav-card-title">Contact</span>
      <span class="nav-card-subtitle">Get in touch</span>
    </div>
    <i class="fa-solid fa-chevron-right nav-card-arrow"></i>
  </a>

</aside>
