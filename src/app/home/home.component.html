<div class="slider-page" [style.backgroundImage]="'url(' + cards[activeIndex].bg + ')'">

  <!-- Dark overlay -->
  <div class="overlay"></div>

  <!-- Top bar — logo only, cards handle navigation -->
  <header class="top-bar">
    <a routerLink="/" class="logo">
      <img src="ronquillo_logo_white_ver.png" alt="logo">
      Michael <span>Ronquillo</span>
    </a>
  </header>

  <!-- Main content — centered -->
  <main class="hero-content">
    <p class="section-label">PORTFOLIO</p>
    <h1 class="hero-title">{{ cards[activeIndex].title }}</h1>
    <p class="hero-desc">{{ cards[activeIndex].desc }}</p>

    <div class="hero-actions" *ngIf="activeIndex === 0">
      <a href="Ronquillo_MichaelArnold_Resume.pdf" class="btn-primary" download target="_blank" (click)="playClickSound()">
        Download Resume <i class="fa-solid fa-download"></i>
      </a>
      <a href="mailto:ronquillomichaelarnold@gmail.com" class="btn-secondary" (click)="playClickSound()">Hire Me</a>
    </div>

    <div class="social-links" *ngIf="activeIndex === 0">
      <a href="https://github.com/Mayk29" target="_blank"><i class="fa-brands fa-github"></i></a>
      <a href="mailto:ronquillomichaelarnold@gmail.com" target="_blank"><i class="fa-solid fa-envelope"></i></a>
      <a href="https://www.facebook.com/michael.ronquillo.9279" target="_blank"><i class="fa-brands fa-facebook"></i></a>
      <a href="https://www.linkedin.com/in/michael-ronquillo-3701b92b1/" target="_blank"><i class="fa-brands fa-linkedin"></i></a>
    </div>

    <a *ngIf="activeIndex !== 0 && cards[activeIndex].link" [href]="cards[activeIndex].link"
       [target]="cards[activeIndex].external ? '_blank' : '_self'"
       class="btn-primary" style="margin-top: 1.5rem; display: inline-block;" (click)="playClickSound()">
      Visit Page <i class="fa-solid fa-arrow-right"></i>
    </a>
  </main>

  <!-- Bottom card nav strip -->
  <div class="card-strip">

    <!-- Desktop: cards shown directly -->
    <ng-container *ngIf="!isMobile">
      <div
        *ngFor="let card of cards; let i = index"
        class="nav-card"
        [class.active]="i === activeIndex"
        (click)="setActive(i)"
        (mouseenter)="playHoverSound()"
        [style.backgroundImage]="'url(' + card.bg + ')'"
      >
        <div class="card-overlay"></div>
        <div class="card-icon"><i [class]="card.icon"></i></div>
        <span class="card-label">{{ card.label }}</span>
      </div>
    </ng-container>

    <!-- Mobile: carousel -->
    <ng-container *ngIf="isMobile">
      <div class="card-strip-track">
        <div
          *ngFor="let card of visibleCards; let i = index"
          class="nav-card"
          [class.active]="card.originalIndex === activeIndex"
          (click)="setActive(card.originalIndex); playClickSound()"
          [style.backgroundImage]="'url(' + card.bg + ')'"
        >
          <div class="card-overlay"></div>
          <div class="card-icon"><i [class]="card.icon"></i></div>
          <span class="card-label">{{ card.label }}</span>
        </div>
      </div>

      <!-- Dots -->
      <div class="carousel-dots">
        <div
          *ngFor="let card of cards; let i = index"
          class="carousel-dot"
          [class.active]="i === activeIndex"
          (click)="setActive(i)"
        ></div>
      </div>

      <!-- Arrows -->
      <div class="carousel-arrows">
        <button class="carousel-arrow" (click)="carouselPrev()">
          <i class="fa-solid fa-chevron-left"></i>
        </button>
        <button class="carousel-arrow" (click)="carouselNext()">
          <i class="fa-solid fa-chevron-right"></i>
        </button>
      </div>
    </ng-container>

  </div>

</div>
